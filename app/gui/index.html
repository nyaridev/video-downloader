<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Downloader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <h1>Video Downloader</h1>
    </header>

    <div class="workspace">
      <div class="settings-pane">
        <input id="url" type="text" class="url-input" placeholder="Paste YouTube URL..." />

        <div class="mode-row" id="modeRow">
          <button type="button" class="mode-btn active" data-mode="video">Video</button>
          <button type="button" class="mode-btn" data-mode="playlist">Playlist</button>
          <button type="button" class="mode-btn" data-mode="channel">Channel</button>
        </div>

        <div class="settings-block">
          <div class="row wrap">
            <span class="label-inline">Items</span>
            <label class="chip"><input type="checkbox" id="chkVideo" checked /> Video</label>
            <label class="chip"><input type="checkbox" id="chkAudio" checked /> Audio</label>
            <label class="chip"><input type="checkbox" id="chkMeta" checked /> Metadata</label>
            <label class="chip"><input type="checkbox" id="chkThumb" checked /> Thumbnail</label>
          </div>
          <div class="row">
            <label class="field-compact" for="videoQuality">Video</label>
            <select id="videoQuality" class="select-compact"></select>
            <label class="field-compact" for="audioQuality">Audio</label>
            <select id="audioQuality" class="select-compact"></select>
          </div>
        </div>

        <div class="settings-block">
          <div class="row">
            <span class="label-inline">Output</span>
            <input id="outputDir" type="text" class="path-input" readonly />
            <button type="button" id="browseBtn" class="btn-sm">Browse</button>
          </div>
          <div class="row wrap">
            <label class="chip"><input type="checkbox" id="chkBundle" checked /> Bundle</label>
            <label class="chip"><input type="checkbox" id="chkCombine" checked /> Combine streams</label>
            <label class="chip"><input type="radio" name="layout" id="layoutRaw" checked /> Flat</label>
            <label class="chip"><input type="radio" name="layout" id="layoutOrg" /> Organized</label>
          </div>
        </div>

        <div class="settings-block">
          <p class="hint">YouTube sign-in if bot check fails.
            <a href="https://github.com/yt-dlp/yt-dlp/issues/7271" target="_blank">Help</a>
          </p>
          <div class="row wrap">
            <label class="chip"><input type="checkbox" id="chkBrowserCookies" checked /> Browser cookies</label>
            <select id="cookieBrowser" class="select-compact"></select>
            <button type="button" id="signInBtn" class="btn-sm">Sign in</button>
            <button type="button" id="saveCookiesBtn" class="btn-sm">Save</button>
          </div>
          <div class="row">
            <input id="cookiesFile" type="text" class="path-input" readonly placeholder="Optional cookies.txt" />
            <button type="button" id="browseCookiesBtn" class="btn-sm">File</button>
          </div>
        </div>
      </div>

      <aside class="side-pane">
        <div class="status-head">
          <span class="label-inline">Queue</span>
        </div>
        <ul id="queueList" class="queue-list"></ul>
        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="progressText" class="progress-text">Idle</p>
        <button type="button" id="downloadBtn" class="download-btn">Download</button>
      </aside>
    </div>

    <footer class="console-pane">
      <div class="console-head">
        <span class="label-inline">Console</span>
        <button type="button" id="clearLogBtn" class="btn-sm">Clear</button>
        <button type="button" id="copyLogBtn" class="btn-sm">Copy</button>
      </div>
      <div id="console" class="console" tabindex="0"></div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
